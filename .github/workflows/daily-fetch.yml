name: 每日知识采集

on:
  schedule:
    - cron: '37 2 * * *'  # 北京时间 10:37（避开整点高峰）
  workflow_dispatch:        # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests feedparser

      - name: 采集
        run: python .github/scripts/fetch.py

      - name: 提交
        run: |
          git config user.name "knowledge-bot"
          git config user.email "bot@knowledge.local"
          git add raw/
          if git diff --cached --quiet; then
            echo "没有新内容"
          else
            git commit -m "采集 $(date +%Y-%m-%d)"
            git push
          fi
